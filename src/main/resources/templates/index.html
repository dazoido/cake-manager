<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cakes Home</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Cake Home</h1>

<div th:each="cake : ${cakesList}">
    <div>
        <img th:src="${cake.image}" th:onerror="'this.src=\'' + @{/img/dummy-cake.jpg} + '\';'" width="100" />
        <p th:text="${cake.title}" />
        <p th:text="${cake.desc}" />
        </div>
    </div>
</div>

</body>

</html>
